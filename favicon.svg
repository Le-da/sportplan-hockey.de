<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#3742fa"/>
    </linearGradient>
    <linearGradient id="ball" x1="25%" y1="25%" x2="75%" y2="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8cce8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Stick shaft (diagonal) -->
  <line x1="21" y1="3" x2="9" y2="21"
        stroke="white" stroke-width="2.8" stroke-linecap="round"
        filter="url(#shadow)"/>

  <!-- Stick hook (field hockey curved blade) -->
  <path d="M 9 21 Q 6 28 13 28 L 19 27.5"
        stroke="white" stroke-width="2.8" stroke-linecap="round"
        stroke-linejoin="round" fill="none"
        filter="url(#shadow)"/>

  <!-- Ball -->
  <circle cx="24" cy="23" r="5" fill="url(#ball)" filter="url(#shadow)"/>
  <!-- Ball highlight -->
  <circle cx="22.5" cy="21.5" r="1.5" fill="white" opacity="0.6"/>
</svg>

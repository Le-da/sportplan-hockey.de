<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#3742fa"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Net lines (behind frame) -->
  <line x1="5" y1="8"  x2="5"  y2="26" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="11" y1="8" x2="11" y2="26" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="17" y1="8" x2="17" y2="26" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="23" y1="8" x2="23" y2="26" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="27" y1="8" x2="27" y2="26" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="5" y1="13" x2="27" y2="13" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="5" y1="19" x2="27" y2="19" stroke="white" stroke-width="0.7" opacity="0.4"/>

  <!-- Goal frame -->
  <line x1="5"  y1="8"  x2="27" y2="8"  stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5"  y1="8"  x2="5"  y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="8"  x2="27" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5"  y1="26" x2="27" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ball inside goal -->
  <circle cx="16" cy="18" r="5" fill="white"/>
</svg>
